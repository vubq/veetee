name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  server-typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: veetee-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: veetee-server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run docs:validate

  voice-server-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: veetee-server/apps/voice-server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked --all-groups
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
